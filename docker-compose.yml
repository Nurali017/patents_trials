services:
  trials-db:
    image: postgres:14-alpine
    container_name: trials_postgres
    restart: always
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${SQL_PASSWORD:-password}
      POSTGRES_DB: trials_db
    volumes:
      - trials_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d trials_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  trials_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trials_service
    command: >
      sh -c "
        echo '⏳ Ожидание БД...' &&
        python manage.py wait_for_db &&
        echo '🔄 Применение миграций...' &&
        python manage.py migrate --noinput &&
        echo '🚀 Запуск сервиса...' &&
        python manage.py runserver 0.0.0.0:8001
      "
    volumes:
      - .:/usr/src/app/
      - ./volumes/media:/media
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      trials-db:
        condition: service_healthy
    environment:
      DEBUG: "1"
      SECRET_KEY: trials-secret-key-change-in-production
      MODE: dev
      HOST_NAME: localhost
      SQL_ENGINE: django.db.backends.postgresql
      SQL_DATABASE: trials_db
      SQL_USER: admin
      SQL_PASSWORD: ${SQL_PASSWORD:-password}
      SQL_HOST: trials-db
      SQL_PORT: "5432"
      PATENTS_SERVICE_URL: http://host.docker.internal:8000
      PATENTS_SERVICE_USERNAME: admin
      PATENTS_SERVICE_PASSWORD: ${PATENTS_SERVICE_PASSWORD:-changeme}

volumes:
  trials_postgres_data:
